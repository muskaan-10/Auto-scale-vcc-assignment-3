<svg width="860" height="560" viewBox="0 0 860 560" xmlns="http://www.w3.org/2000/svg" style="background:#fafafa;font-family:Arial,sans-serif">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#c62828" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arr-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text x="430" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a53a0">Assignment 3 — Auto-Scaling Architecture | IIT Jodhpur | GCP</text>

<!-- LOCAL VM ZONE -->
<rect x="20" y="45" width="390" height="420" rx="16" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="8 4"/>
<text x="215" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#0F6E56">Local Environment (VirtualBox — Ubuntu 24.04)</text>

<!-- stress tool -->
<rect x="40" y="80" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="125" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#444441">stress --cpu 2</text>
<text x="125" y="117" text-anchor="middle" font-size="10" fill="#5F5E5A">Simulates CPU spike</text>

<!-- Sample App local -->
<rect x="220" y="80" width="170" height="50" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="305" y="100" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Sample Flask App</text>
<text x="305" y="117" text-anchor="middle" font-size="10" fill="#0F6E56">localhost:5000</text>

<!-- monitor.py -->
<rect x="40" y="160" width="350" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text x="215" y="183" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">monitor.py</text>
<text x="215" y="200" text-anchor="middle" font-size="10" fill="#534AB7">Reads CPU via top | Checks every 5s | Threshold: 70%</text>

<!-- Policy check -->
<rect x="40" y="250" width="350" height="60" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="215" y="273" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">Auto-Scaling Policy Check</text>
<text x="215" y="291" text-anchor="middle" font-size="10" fill="#854F0B">CPU &gt; 70%? | Cooldown expired? | Instances &lt; 3?</text>

<!-- gcloud CLI -->
<rect x="40" y="340" width="350" height="60" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.8"/>
<text x="215" y="363" text-anchor="middle" font-size="13" font-weight="bold" fill="#791F1F">gcloud compute instances create</text>
<text x="215" y="381" text-anchor="middle" font-size="10" fill="#A32D2D">e2-micro | asia-south2-a | ubuntu-2204-lts</text>

