<line x1="412" y1="370" x2="478" y2="370" stroke="#1a73e8" stroke-width="2" marker-end="url(#arr-blue)"/>
<text x="445" y="362" text-anchor="middle" font-size="11" fill="#1a73e8">gcloud API</text>

