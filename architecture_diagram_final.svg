<rect x="575" y="508" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
<text x="593" y="519" font-size="11" fill="#333">GCP cloud</text>
<line x1="680" y1="514" x2="710" y2="514" stroke="#1a73e8" stroke-width="2" marker-end="url(#arr-blue)"/>
