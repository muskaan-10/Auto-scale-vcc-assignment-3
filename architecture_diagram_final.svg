<text x="660" y="118" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">Compute Engine Instance</text>
<text x="660" y="138" text-anchor="middle" font-size="10" fill="#185FA5">autoscale-vm | e2-micro | RUNNING</text>

<!-- Startup script -->
<rect x="500" y="180" width="320" height="60" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
<text x="660" y="203" text-anchor="middle" font-size="13" font-weight="bold" fill="#27500A">Startup Script (auto-runs)</text>
<text x="660" y="221" text-anchor="middle" font-size="10" fill="#3B6D11">apt install python3 flask → start app.py</text>

<!-- Flask on GCP -->
<rect x="500" y="265" width="320" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
<text x="660" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Sample App (GCP)</text>
<text x="660" y="306" text-anchor="middle" font-size="10" fill="#0F6E56">http://34.131.111.9 — port 80</text>

<!-- Firewall -->
<rect x="500" y="350" width="320" height="55" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="660" y="372" text-anchor="middle" font-size="13" font-weight="bold" fill="#444441">Firewall Rule</text>
<text x="660" y="390" text-anchor="middle" font-size="10" fill="#5F5E5A">http-server tag | tcp:80 | 0.0.0.0/0</text>

<!-- GCP Console -->
<rect x="500" y="428" width="320" height="25" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
<text x="660" y="445" text-anchor="middle" font-size="11" fill="#633806">GCP Console — Observability Dashboard (CPU graph visible)</text>

<!-- Arrows inside GCP -->
<line x1="660" y1="155" x2="660" y2="178" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="660" y1="240" x2="660" y2="263" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<line x1="660" y1="325" x2="660" y2="348" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

