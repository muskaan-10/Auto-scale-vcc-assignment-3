<rect x="480" y="45" width="360" height="420" rx="16" fill="none" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="8 4"/>
<text x="660" y="68" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">Google Cloud Platform</text>
<text x="660" y="84" text-anchor="middle" font-size="11" fill="#185FA5">Project: auto-scale-vm-project | Zone: asia-south2-a</text>

