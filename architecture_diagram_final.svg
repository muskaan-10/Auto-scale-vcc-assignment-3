<line x1="125" y1="130" x2="155" y2="158" stroke="#555" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
<text x="115" y="150" font-size="10" fill="#777">CPU spike</text>
<line x1="215" y1="220" x2="215" y2="248" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
<text x="220" y="240" font-size="10" fill="#777">check</text>
<line x1="215" y1="310" x2="215" y2="338" stroke="#c62828" stroke-width="1.5" marker-end="url(#arr-red)"/>
<text x="220" y="330" font-size="10" fill="#c62828">trigger</text>

